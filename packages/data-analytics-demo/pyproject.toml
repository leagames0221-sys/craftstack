[project]
name = "data-analytics-demo"
version = "0.1.0"
description = "Local-only SaaS customer-analytics demo: SQL marts + churn/upsell ML + local LLM narrative + BI dashboard. Zero credit card, zero external API, synthetic data only."
requires-python = ">=3.11"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "craftstack" }]

dependencies = [
    # Storage / data plane — DuckDB ≥ 1.4.2 mitigates CVE-2025-64429 (encryption crypto)
    "duckdb>=1.4.2",
    # dbt transformation layer
    "dbt-core>=1.8,<2.0",
    "dbt-duckdb>=1.8,<2.0",
    # ML stack
    "scikit-learn>=1.5",
    "xgboost>=2.1",
    "shap>=0.46",
    "pandas>=2.2",
    "numpy>=1.26",
    # Synthetic data generation
    "faker>=30.0",
    # Local LLM client (Ollama) — HTTP to localhost:11434, no external network
    "ollama>=0.4",
    # Semantic layer
    "dbt-metricflow>=0.13",
    # CLI + data validation
    "typer>=0.14",
    "pydantic>=2.9",
    # Dashboard (self-built static HTML; replaces Evidence — see ADR-0070 amendment).
    "jinja2>=3.1",
    "plotly>=5.24",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.7",
    "mypy>=1.13",
    "pip-audit>=2.7",
    "types-PyYAML>=6.0",
]

[project.scripts]
data-analytics-demo = "data_analytics_demo.cli:app"

[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
data_analytics_demo = ["py.typed"]

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "N", "S", "T20"]
ignore = ["S101"]  # assert use is OK in tests

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S", "T20"]

[tool.mypy]
strict = true
python_version = "3.11"
namespace_packages = true
explicit_package_bases = true
mypy_path = "src"

# Third-party libraries without published type stubs. `pandas-stubs` exists
# but lags behind `pandas` releases; treating these as untyped is the
# pragmatic choice for a Python 3.11 + pandas 3.x stack.
[[tool.mypy.overrides]]
module = ["pandas", "pandas.*", "duckdb", "faker", "shap", "xgboost", "sklearn.*", "plotly", "plotly.*", "yaml"]
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=data_analytics_demo --cov-report=term-missing --cov-fail-under=80"

[tool.coverage.run]
source = ["src/data_analytics_demo"]
omit = ["tests/*", "**/__init__.py"]
