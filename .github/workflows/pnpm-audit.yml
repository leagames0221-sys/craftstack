name: pnpm audit

on:
  push:
    branches: [main, master]
    paths:
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/pnpm-audit.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '22'  # pnpm 11+ 要求 (corepack 経由で latest が引かれる)

      - name: enable corepack (pnpm)
        run: corepack enable

      - name: pnpm audit (fail on high+)
        run: pnpm audit --audit-level=high
