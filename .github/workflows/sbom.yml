name: SBOM

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# Software Bill of Materials in CycloneDX 1.5 format. Generated from the
# pnpm lockfile for both apps; attached to the GitHub Release that
# triggered the run. Zero external cost — GitHub Actions for public
# repos is free, and the @cyclonedx/cdxgen generator is MIT.

permissions:
  contents: write

jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Don't pin a pnpm version here — package.json's `packageManager`
      # field is the single source of truth. pnpm/action-setup@v6 errors
      # out ("Multiple versions of pnpm specified") when both are set,
      # which is how a previous v0.4.x sbom run silently failed. Keep
      # this block minimal so the lockfile stays authoritative.
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # cdxgen has a native sqlite3 transitive dep (@appthreat/sqlite3)
      # whose build script pnpm 9 blocks by default under its new
      # allowlist policy. Switching from `pnpm dlx` to `npx` avoids
      # the ERR_PNPM_IGNORED_BUILDS failure without loosening local
      # dev's pnpm security posture. Warm the cache once so the three
      # generate steps below don't re-download the tarball.
      - name: Warm cdxgen cache
        run: npx -y @cyclonedx/cdxgen@11 --help >/dev/null 2>&1 || true

      - name: Generate SBOM (collab)
        run: npx -y @cyclonedx/cdxgen@11 -o sbom-collab.cdx.json --spec-version 1.5 -t pnpm apps/collab
      - name: Generate SBOM (knowledge)
        run: npx -y @cyclonedx/cdxgen@11 -o sbom-knowledge.cdx.json --spec-version 1.5 -t pnpm apps/knowledge
      - name: Generate SBOM (root)
        run: npx -y @cyclonedx/cdxgen@11 -o sbom-root.cdx.json --spec-version 1.5 -t pnpm .

      - name: Upload SBOMs as workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom-*.cdx.json
          retention-days: 90

      # On a tag push, ensure the release exists (create it if not) and
      # then attach the three SBOMs. `gh release create` is idempotent
      # enough here: we use `|| true` on create so an already-existing
      # release doesn't fail the job, and `--clobber` on upload so a
      # re-run overwrites stale artefacts. This fixes the previous
      # behaviour where the tag fired but no release had been created,
      # making `gh release upload` fail with a 404.
      - name: Attach SBOMs to the release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            --verify-tag \
            || echo "release ${GITHUB_REF_NAME} already exists, skipping create"
          gh release upload "${GITHUB_REF_NAME}" \
            sbom-collab.cdx.json \
            sbom-knowledge.cdx.json \
            sbom-root.cdx.json \
            --clobber
