name: Live smoke

# Runs Playwright smoke suites against the live Vercel deployments of
# both apps. Triggers:
#
#   - schedule: every 6 hours, catches regressions that slip past CI
#     (Vercel rollbacks, Neon maintenance windows, Gemini quota
#     issues, etc.) without needing a new push.
#   - workflow_dispatch: manual run from the Actions tab.
#   - push on main: runs 90 s after the push so Vercel has time to
#     finish the deploy that a main-branch merge triggers.
#
# Both suites are cheap: public-page renders and structured API
# probes, no auth, no Gemini calls, no ingest. See
# apps/knowledge/tests/smoke/stats.spec.ts (notably the
# `indexType === "hnsw"` guard against an ivfflat regression —
# ADR-0041) and apps/collab/tests/e2e/a11y.spec.ts (WCAG 2.1 AA
# against /, /signin, /playground).

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/knowledge/**"
      - "apps/collab/**"
      - ".github/workflows/smoke.yml"

concurrency:
  group: live-smoke
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  knowlex-live-smoke:
    name: knowlex live smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - name: Wait for Vercel deploy to settle (push only)
        if: github.event_name == 'push'
        run: sleep 90

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browser
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" != "true" ]; then
            pnpm --filter knowledge exec playwright install --with-deps chromium
          else
            pnpm --filter knowledge exec playwright install-deps chromium
          fi

      # External-artifact freshness probe (ADR-0057 axis 12). Asserts
      # that the URLs the README + portfolio-lp depend on are still
      # reachable: shields.io endpoint badge JSON, the two Loom
      # walkthrough videos, the live Knowlex deploy. A 404 / 5xx on
      # any of these silently breaks the README; this catches it.
      # `--head` for HTTP HEAD only; `-f` so curl exits non-zero on
      # any 4xx/5xx; `-L` to follow redirects (Loom embed URLs do).
      - name: Probe external artefacts (ADR-0057 axis 12)
        run: |
          set -euo pipefail
          urls=(
            "https://img.shields.io/endpoint?url=https%3A%2F%2Fraw.githubusercontent.com%2Fleagames0221-sys%2Fcraftstack%2Fmain%2Fdocs%2Feval%2Fbadge.json"
            "https://www.loom.com/share/1f6915e588cb4176bfc8272f0f9310bb"
            "https://www.loom.com/share/acff991e3da94d5aa4e98dcee0b100e2"
            "https://craftstack-collab.vercel.app/"
            "https://craftstack-knowledge.vercel.app/"
          )
          for u in "${urls[@]}"; do
            echo "  [HEAD] $u"
            curl -sS -fL --head --max-time 15 "$u" >/dev/null
          done
          echo "All external artefacts reachable."

      # Cron health enforcement (ADR-0059 axis 6 hardening). The
      # /api/attestation endpoint exposes `measurements.daysSinceLastGreenRun`
      # — until v0.5.10 this was passive disclosure (a reviewer who
      # curled the endpoint would see staleness, but no automated gate
      # caught it). Threshold = 7 days: the eval cron runs nightly, so
      # 7 consecutive failures is unambiguously broken (vs 1-2 nights
      # of Neon cold-start flake which ADR-0049 § retry-contract is
      # designed to absorb). Tripping this fails smoke, surfacing the
      # eval-pipeline regression in the same workflow that catches
      # deploy regressions.
      - name: Cron health threshold (ADR-0059 axis 6)
        run: |
          set -euo pipefail
          payload=$(curl -sS --max-time 15 https://craftstack-knowledge.vercel.app/api/attestation)
          days=$(echo "$payload" | jq -r '.measurements.daysSinceLastGreenRun // "null"')
          if [ "$days" = "null" ]; then
            echo "::warning::no daysSinceLastGreenRun in /api/attestation; eval may never have run"
          else
            echo "  daysSinceLastGreenRun = $days"
            # bc is preinstalled on ubuntu-latest. Threshold = 7 days.
            if [ "$(echo "$days > 7" | bc -l)" = "1" ]; then
              echo "::error::eval cron has been red for $days days; investigate docs/eval/reports/"
              exit 1
            fi
          fi

      - name: Run Knowlex live smoke
        env:
          E2E_BASE_URL: https://craftstack-knowledge.vercel.app
        run: pnpm --filter knowledge test:e2e:smoke

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: knowlex-smoke-report
          path: apps/knowledge/playwright-report/
          retention-days: 7

  collab-live-smoke:
    name: boardly live smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - name: Wait for Vercel deploy to settle (push only)
        if: github.event_name == 'push'
        run: sleep 90

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browser
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" != "true" ]; then
            pnpm --filter collab exec playwright install --with-deps chromium
          else
            pnpm --filter collab exec playwright install-deps chromium
          fi

      - name: Run Boardly a11y smoke against live
        env:
          CI: "true"
          E2E_BASE_URL: https://craftstack-collab.vercel.app
        # `a11y.spec.ts` already covers the three public surfaces and
        # is safe to run against a live deploy (no auth, no state
        # mutation). Its assertions — zero `serious`/`critical` WCAG
        # 2.1 AA violations — are the right shape for a post-deploy
        # gate. `--project=chromium` pins to the single browser
        # installed above; playwright.config.ts declares webkit too
        # but we don't install that binary for CI speed, and running
        # it would fail with "Executable doesn't exist" as the actual
        # root cause of any red smoke run against this suite.
        run: pnpm --filter collab exec playwright test tests/e2e/a11y.spec.ts --project=chromium

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: collab-smoke-report
          path: apps/collab/playwright-report/
          retention-days: 7
