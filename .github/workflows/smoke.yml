name: Live smoke

# Runs the Knowlex Playwright smoke suite against the live Vercel
# deployment. Triggers:
#
#   - schedule: every 6 hours, catches regressions that slip past CI
#     (Vercel rollbacks, Neon maintenance windows, Gemini quota
#     issues, etc.) without needing a new push.
#   - workflow_dispatch: manual run from the Actions tab when you
#     want to verify a just-published deploy.
#   - push on main: runs 90 s after the push so Vercel has time to
#     finish the deploy that a main-branch merge triggers.
#
# The suite itself is cheap: three checks (Ask UI, Corpus UI,
# /api/kb/stats shape). No Gemini API calls, no ingestion, no auth.
# See apps/knowledge/tests/smoke/stats.spec.ts for the assertions
# (notably the `indexType === "hnsw"` guard against an ivfflat
# regression — see ADR-0041).

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/knowledge/**"
      - ".github/workflows/smoke.yml"

concurrency:
  group: live-smoke
  cancel-in-progress: false

jobs:
  knowlex-live-smoke:
    name: knowlex live smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - name: Wait for Vercel deploy to settle (push only)
        if: github.event_name == 'push'
        run: sleep 90

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browser
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" != "true" ]; then
            pnpm --filter knowledge exec playwright install --with-deps chromium
          else
            pnpm --filter knowledge exec playwright install-deps chromium
          fi

      - name: Run Knowlex live smoke
        env:
          E2E_BASE_URL: https://craftstack-knowledge.vercel.app
        run: pnpm --filter knowledge test:e2e:smoke

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: knowlex-smoke-report
          path: apps/knowledge/playwright-report/
          retention-days: 7
