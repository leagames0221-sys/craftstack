name: Live smoke

# Runs Playwright smoke suites against the live Vercel deployments of
# both apps. Triggers:
#
#   - schedule: every 6 hours, catches regressions that slip past CI
#     (Vercel rollbacks, Neon maintenance windows, Gemini quota
#     issues, etc.) without needing a new push.
#   - workflow_dispatch: manual run from the Actions tab.
#   - push on main: runs 90 s after the push so Vercel has time to
#     finish the deploy that a main-branch merge triggers.
#
# Both suites are cheap: public-page renders and structured API
# probes, no auth, no Gemini calls, no ingest. See
# apps/knowledge/tests/smoke/stats.spec.ts (notably the
# `indexType === "hnsw"` guard against an ivfflat regression —
# ADR-0041) and apps/collab/tests/e2e/a11y.spec.ts (WCAG 2.1 AA
# against /, /signin, /playground).

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/knowledge/**"
      - "apps/collab/**"
      - ".github/workflows/smoke.yml"

concurrency:
  group: live-smoke
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  knowlex-live-smoke:
    name: knowlex live smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - name: Wait for Vercel deploy to settle (push only)
        if: github.event_name == 'push'
        run: sleep 90

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browser
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" != "true" ]; then
            pnpm --filter knowledge exec playwright install --with-deps chromium
          else
            pnpm --filter knowledge exec playwright install-deps chromium
          fi

      - name: Run Knowlex live smoke
        env:
          E2E_BASE_URL: https://craftstack-knowledge.vercel.app
        run: pnpm --filter knowledge test:e2e:smoke

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: knowlex-smoke-report
          path: apps/knowledge/playwright-report/
          retention-days: 7

  collab-live-smoke:
    name: boardly live smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - name: Wait for Vercel deploy to settle (push only)
        if: github.event_name == 'push'
        run: sleep 90

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browser
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" != "true" ]; then
            pnpm --filter collab exec playwright install --with-deps chromium
          else
            pnpm --filter collab exec playwright install-deps chromium
          fi

      - name: Run Boardly a11y smoke against live
        env:
          CI: "true"
          E2E_BASE_URL: https://craftstack-collab.vercel.app
        # `a11y.spec.ts` already covers the three public surfaces and
        # is safe to run against a live deploy (no auth, no state
        # mutation). Its assertions — zero `serious`/`critical` WCAG
        # 2.1 AA violations — are the right shape for a post-deploy
        # gate. `--project=chromium` pins to the single browser
        # installed above; playwright.config.ts declares webkit too
        # but we don't install that binary for CI speed, and running
        # it would fail with "Executable doesn't exist" as the actual
        # root cause of any red smoke run against this suite.
        run: pnpm --filter collab exec playwright test tests/e2e/a11y.spec.ts --project=chromium

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: collab-smoke-report
          path: apps/collab/playwright-report/
          retention-days: 7
