name: RAG eval

# Nightly Knowlex RAG regression eval against the live Vercel deploy.
#
# Triggers:
#   - schedule: 04:00 UTC nightly. Matches the Vercel Hobby low-traffic
#     window and gives the eval two full cron cycles to complete before
#     any human looks at the result in the morning.
#   - workflow_dispatch: manual run from the Actions tab against any
#     target URL (defaults to the live Knowlex deploy).
#
# Why no `GEMINI_API_KEY` GitHub secret is required: the eval script
# (`apps/knowledge/scripts/eval.ts`) reads only `E2E_BASE_URL` and
# makes plain HTTP calls to `/api/kb/ingest` + `/api/kb/ask` on the
# target Knowlex deploy. The Gemini round-trip is server-side inside
# the target's own Route Handler, using that server's existing Vercel
# env (already set when Knowlex went live). The workflow never sees
# or forwards the key.
#
# The job loads `docs/eval/golden_qa.json` (v3: 10 corpus documents /
# 30 questions), seeds the corpus into the target deploy via
# /api/kb/ingest (duplicates tolerated — the retriever ranks by
# distance, not recency), fires each question through /api/kb/ask,
# and scores answers against the expectedSubstrings +
# expectedDocumentTitle + latency-p95 thresholds declared in the
# golden-set manifest. The script exits non-zero on pass-rate or
# latency regression, so the workflow failure is the regression
# signal.
#
# Failure protocol:
#   - Non-zero exit is treated as a regression. A follow-up
#     improvement will auto-open a GitHub issue with the artifact
#     attached.
#   - Report JSON is written to docs/eval/reports/YYYY-MM-DD.json and
#     uploaded as a workflow artifact.
#   - On green runs (eval step succeeds) the report file plus the
#     refreshed docs/eval/badge.json are committed back to main so the
#     measured-eval README badge stays sourced from a real time series.
#     Failed runs do not commit (the eval-bot never lands a regression
#     report on main).
#
# See docs/eval/README.md for the eval methodology, threshold
# semantics, and ADR-0049 § 7th arc Tier C-#2 follow-up that this
# auto-commit step closes.

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      base_url:
        description: "Target Knowlex URL (default: live)"
        required: false
        default: "https://craftstack-knowledge.vercel.app"

concurrency:
  group: rag-eval
  cancel-in-progress: false

permissions:
  # Bumped to write so the green-run report + badge.json can land on
  # main from the workflow itself. Failed runs short-circuit before
  # the commit step so a regression report never reaches main.
  contents: write

jobs:
  eval:
    name: Knowlex RAG eval
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client (knowledge)
        run: pnpm --filter knowledge prisma generate

      - name: Run Knowlex RAG eval
        env:
          # E2E_BASE_URL points at the live Knowlex deploy by default;
          # workflow_dispatch can override via inputs.base_url. The
          # eval script makes HTTP calls only — no Gemini SDK usage
          # inside this job, so no GEMINI_API_KEY forwarding required.
          E2E_BASE_URL: ${{ inputs.base_url || 'https://craftstack-knowledge.vercel.app' }}
        run: pnpm --filter knowledge eval

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: rag-eval-report
          path: docs/eval/reports/
          retention-days: 30
          if-no-files-found: ignore

      # Refresh badge.json from the latest report so the README
      # shields.io endpoint badge tracks the most recent green run.
      - name: Regenerate badge.json from latest report
        if: success()
        run: node scripts/eval-badge.mjs

      # Auto-commit-on-green. Failed runs never reach this step
      # because of `if: success()`, so a regression report never
      # lands on main from the workflow itself.
      - name: Commit report + badge to main on success
        if: success() && github.event_name != 'pull_request'
        run: |
          git config user.name "eval-bot"
          git config user.email "263370648+leagames0221-sys@users.noreply.github.com"
          git add docs/eval/reports/ docs/eval/badge.json
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "chore(eval): commit green run report + refresh measured badge"
            git push origin HEAD:main
          fi
