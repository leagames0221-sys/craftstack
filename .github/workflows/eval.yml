name: RAG eval

# Nightly Knowlex RAG regression eval against the live Vercel deploy.
#
# Triggers:
#   - workflow_dispatch: manual run from the Actions tab. This is the
#     only trigger in effect at land-time. Once the `GEMINI_API_KEY`
#     secret is configured in the repo, a follow-up PR flips the
#     commented `schedule` block on and the cron starts firing nightly.
#   - schedule (commented out): 04:00 UTC nightly. Matches the Vercel
#     hobby low-traffic window and gives the eval two full cron cycles
#     to complete before any human looks at the result in the morning.
#
# The job runs `pnpm --filter knowledge eval` which loads
# docs/eval/golden_qa.json (v3: 10 corpus documents / 30 questions),
# seeds the corpus into the live Knowlex deploy via /api/kb/ingest,
# fires each question through /api/kb/ask, and scores answers against
# expectedSubstrings + expectedDocumentTitle + latency-p95 thresholds.
# The script exits non-zero on pass-rate or latency regression, so the
# workflow failure is the regression signal.
#
# Failure protocol:
#   - Non-zero exit is treated as a regression. A follow-up improvement
#     will auto-open a GitHub issue with the artifact attached.
#   - Report JSON is written to docs/eval/reports/YYYY-MM-DD.json and
#     uploaded as a workflow artifact. A follow-up improvement will
#     commit passing reports back to main so trend visualisation
#     becomes possible.
#
# See docs/eval/README.md for the eval methodology, threshold
# semantics, and the Session 256-B roadmap that tracks the cron-on
# flip and the report-commit automation.

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Target Knowlex URL (default: live)"
        required: false
        default: "https://craftstack-knowledge.vercel.app"
  # schedule:
  #   - cron: "0 4 * * *"

concurrency:
  group: rag-eval
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  eval:
    name: Knowlex RAG eval
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client (knowledge)
        run: pnpm --filter knowledge prisma generate

      - name: Run Knowlex RAG eval
        env:
          # GEMINI_API_KEY is required only for the live endpoint's own
          # ingest + ask handlers to succeed; the eval script itself is
          # Node-only with no Gemini dependency. If the secret is not
          # configured, the live endpoint returns 503 on ingest/ask and
          # the eval exits non-zero, which is the correct signal.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          E2E_BASE_URL: ${{ inputs.base_url || 'https://craftstack-knowledge.vercel.app' }}
        run: pnpm --filter knowledge eval

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rag-eval-report
          path: docs/eval/reports/
          retention-days: 30
          if-no-files-found: ignore
