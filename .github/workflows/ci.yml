name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Minimum-privilege default for every job in this workflow. Individual
# jobs can narrow further but cannot escalate.
permissions:
  contents: read

jobs:
  free-tier-compliance:
    name: free-tier compliance
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      # Node-only check, zero deps. PR-blocking gate that enforces the
      # zero-cost-by-construction guarantee declared in COST_SAFETY.md
      # and ADR-0046: no paid-tier Vercel plans, no billable SDKs, no
      # leaked secrets in example files.
      - name: Run free-tier compliance check
        run: node scripts/check-free-tier-compliance.mjs

  ci:
    name: lint / typecheck / test / build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma clients
        run: |
          pnpm --filter collab exec prisma generate
          pnpm --filter knowledge exec prisma generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Audit dependencies (advisory)
        run: pnpm audit --prod --audit-level moderate || true
        continue-on-error: true

  knowledge-integration:
    name: knowlex integration (pgvector)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Knowlex Prisma client
        run: pnpm --filter knowledge exec prisma generate

      - name: Create knowlex database + pgvector extension
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -c 'CREATE DATABASE knowlex;'
          psql -h localhost -U postgres -d knowlex -c 'CREATE EXTENSION vector;'
          psql -h localhost -U postgres -c 'CREATE DATABASE knowlex_shadow;'
          psql -h localhost -U postgres -d knowlex_shadow -c 'CREATE EXTENSION vector;'

      - name: Apply migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/knowlex
          DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/knowlex
        run: pnpm --filter knowledge exec prisma migrate deploy

      # ADR-0051 § Not in scope #2 — schema-vs-migrations drift detection
      # at PR time. Catches the failure class: someone updates
      # `prisma/schema.prisma` without committing the corresponding
      # migration file. `prisma migrate diff --from-migrations
      # --to-schema-datamodel --exit-code` requires a shadow DB to
      # apply migrations into; we use `knowlex_shadow` (created
      # above) on the same Postgres service.
      #
      # Exit codes: 0 = no drift, 2 = drift present (non-empty diff),
      # 1 = error. `--exit-code` flips the success-on-empty-diff
      # default. CI fails on 2, so any uncommitted schema change
      # blocks the PR.
      #
      # The v0.5.0 incident itself was prod-side (Vercel build never
      # ran `prisma migrate deploy`), not PR-side: the schema and
      # migrations were aligned in the v0.5.0 PR. This step catches
      # a *different* drift class and is the second layer of
      # defence per ChatGPT Q4 review.
      - name: Verify schema matches migrations (drift detect)
        env:
          SHADOW_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/knowlex_shadow
        working-directory: apps/knowledge
        run: |
          npx prisma migrate diff \
            --from-migrations prisma/migrations \
            --to-schema prisma/schema.prisma \
            --shadow-database-url "$SHADOW_DATABASE_URL" \
            --exit-code

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/knowlex
          DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/knowlex
        run: pnpm --filter knowledge test:integration

  a11y-knowledge:
    name: knowlex a11y gate (WCAG 2.1 AA)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Same pgvector service as the integration job — /kb renders
    # CorpusClient which calls /api/kb/stats, and that query set
    # needs a live Embedding table.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Knowlex Prisma client
        run: pnpm --filter knowledge exec prisma generate

      - name: Create knowlex database + pgvector extension
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -c 'CREATE DATABASE knowlex;'
          psql -h localhost -U postgres -d knowlex -c 'CREATE EXTENSION vector;'

      - name: Apply migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/knowlex
          DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/knowlex
        run: pnpm --filter knowledge exec prisma migrate deploy

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browser
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" != "true" ]; then
            pnpm --filter knowledge exec playwright install --with-deps chromium
          else
            pnpm --filter knowledge exec playwright install-deps chromium
          fi

      # E2E_BASE_URL left unset so playwright.config.ts auto-spins up
      # `pnpm dev` on :3001. The a11y spec itself needs no secrets —
      # /, /kb, /docs/api are all public pages — and the Gemini key is
      # optional at load time (ingest / ask calls aren't exercised).
      - name: Run Knowlex a11y gate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/knowlex
          DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/knowlex
        run: pnpm --filter knowledge exec playwright test tests/smoke/a11y.spec.ts

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: knowlex-a11y-report
          path: apps/knowledge/playwright-report/
          retention-days: 7
