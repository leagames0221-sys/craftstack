name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Minimum-privilege default for every job in this workflow. Individual
# jobs can narrow further but cannot escalate.
permissions:
  contents: read

jobs:
  free-tier-compliance:
    name: free-tier compliance
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      # Node-only check, zero deps. PR-blocking gate that enforces the
      # zero-cost-by-construction guarantee declared in COST_SAFETY.md
      # and ADR-0046: no paid-tier Vercel plans, no billable SDKs, no
      # leaked secrets in example files.
      - name: Run free-tier compliance check
        run: node scripts/check-free-tier-compliance.mjs

  ci:
    name: lint / typecheck / test / build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma clients
        run: |
          pnpm --filter collab exec prisma generate
          pnpm --filter knowledge exec prisma generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Audit dependencies (advisory)
        run: pnpm audit --prod --audit-level moderate || true
        continue-on-error: true

  knowledge-integration:
    name: knowlex integration (pgvector)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Knowlex Prisma client
        run: pnpm --filter knowledge exec prisma generate

      - name: Create knowlex database + pgvector extension
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -c 'CREATE DATABASE knowlex;'
          psql -h localhost -U postgres -d knowlex -c 'CREATE EXTENSION vector;'

      - name: Apply migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/knowlex
          DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/knowlex
        run: pnpm --filter knowledge exec prisma migrate deploy

      # NOTE on PR-time drift detection (ADR-0051 § Not in scope #2):
      #
      # `prisma migrate diff --from-migrations --to-schema --exit-code`
      # was attempted in PR #27 (commits 55e31e6 / 54eca07) but
      # surfaced **pre-existing structural drift that Prisma cannot
      # represent**: the v0.4.x HNSW index on `Embedding.embedding`
      # is created via raw SQL in migration `20260424_hnsw`, but
      # Prisma's declarative schema language does not natively
      # express HNSW indexes. Result: every PR would fail drift
      # detect with `[-] Removed index on columns (embedding)`
      # even when no schema change was made — a false positive that
      # blocks all PRs.
      #
      # Two paths forward (deferred to v0.5.3):
      # 1. Snapshot post-migration `prisma db pull` output as a
      #    canonical reference and diff PR-time DB introspection
      #    against it (sidesteps schema.prisma's HNSW gap).
      # 2. Custom Node script that introspects the DB after
      #    `prisma migrate deploy` and asserts a known-good shape
      #    (table list, column list, index list including HNSW).
      #
      # Until then, the integration tests below provide *indirect*
      # drift detection: they exercise workspaceId-aware routes that
      # would fail if the generated client and the migrated DB
      # diverge. Weaker than a dedicated drift gate but the state
      # of the art given Prisma's HNSW limitation.

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/knowlex
          DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/knowlex
        run: pnpm --filter knowledge test:integration

  a11y-knowledge:
    name: knowlex a11y gate (WCAG 2.1 AA)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Same pgvector service as the integration job — /kb renders
    # CorpusClient which calls /api/kb/stats, and that query set
    # needs a live Embedding table.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Knowlex Prisma client
        run: pnpm --filter knowledge exec prisma generate

      - name: Create knowlex database + pgvector extension
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -c 'CREATE DATABASE knowlex;'
          psql -h localhost -U postgres -d knowlex -c 'CREATE EXTENSION vector;'

      - name: Apply migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/knowlex
          DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/knowlex
        run: pnpm --filter knowledge exec prisma migrate deploy

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browser
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" != "true" ]; then
            pnpm --filter knowledge exec playwright install --with-deps chromium
          else
            pnpm --filter knowledge exec playwright install-deps chromium
          fi

      # E2E_BASE_URL left unset so playwright.config.ts auto-spins up
      # `pnpm dev` on :3001. The a11y spec itself needs no secrets —
      # /, /kb, /docs/api are all public pages — and the Gemini key is
      # optional at load time (ingest / ask calls aren't exercised).
      - name: Run Knowlex a11y gate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/knowlex
          DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/knowlex
        run: pnpm --filter knowledge exec playwright test tests/smoke/a11y.spec.ts

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: knowlex-a11y-report
          path: apps/knowledge/playwright-report/
          retention-days: 7
