version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 10
    groups:
      next:
        patterns:
          - "next"
          - "eslint-config-next"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      prisma:
        patterns:
          - "prisma"
          - "@prisma/*"
      auth:
        patterns:
          - "next-auth"
          - "@auth/*"
      ai:
        patterns:
          - "ai"
          - "@ai-sdk/*"
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@playwright/*"
          - "@axe-core/*"
      dev:
        dependency-type: "development"
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore(ci)"

  - package-ecosystem: pip
    directory: /packages/data-analytics-demo
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 5
    groups:
      dbt:
        patterns:
          - "dbt-*"
      ml:
        patterns:
          - "scikit-learn"
          - "xgboost"
          - "shap"
          - "pandas"
          - "numpy"
      duckdb:
        patterns:
          - "duckdb"
      dev:
        dependency-type: "development"
    labels:
      - dependencies
      - python
    commit-message:
      prefix: "chore(deps)"
